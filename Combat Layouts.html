<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dungeon Debt — Combat Layout Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inconsolata:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    body { font-family: Inter, system-ui, sans-serif; }
    /* Crisp pixel-art for sprites everywhere */
    img { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="combat-variants.jsx"></script>

  <script type="text/babel">
    const { VariantBattleStage, VariantPortraitCards, VariantArena } = window;

    function App() {
      return (
        <DesignCanvas
          title="Combat Layout — Bigger Unit Art"
          subtitle="Same scenario in every variant. Read the notes on each artboard."
        >
          <DCSection
            id="combat"
            title="Combat panel layouts"
            subtitle="Three takes at making the unit art readable. All shown at 1920×1080."
          >
            <DCArtboard id="stage" label="A · Battle Stage  (recommended)"
              width={1920} height={1080}>
              <VariantBattleStage />
            </DCArtboard>

            <DCArtboard id="cards" label="B · Tall Portrait Cards"
              width={1920} height={1080}>
              <VariantPortraitCards />
            </DCArtboard>

            <DCArtboard id="arena" label="C · Arena (left vs right)"
              width={1920} height={1080}>
              <VariantArena />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
